<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            background-color: green;
            height: 100px;
            width: 100px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        div > div {
            background-color: blue;
            height: 50px;
            width: 50px;
            rotate: 45deg;
        }

        div > div:after {
            content: "";
            background-color: white;
            border-radius: 69px;
            height: 30px;
            width: 30px;
        }

    </style>
</head>
<body>
    <div><div></div></div>
</body>
</html>
