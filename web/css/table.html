<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr {
            font-style: italic;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            border-collapse: collapse;
        }
        
        tr:nth-child(even) {background-color: #8f8f8f;}
        tr:nth-child(odd) {background-color: #c8c8c8;}
    </style>
</head>
<body>
    <table>
        <tr>
            <td>name</td>
            <td>value</td>
        </tr>
        <tr>
            <td>A</td>
            <td>5</td>
        </tr>
        <tr>
            <td>B</td>
            <td>8</td>
        </tr>
        <tr>
            <td>C</td>
            <td>9</td>
        </tr>
    </table>
</body>
</html>
